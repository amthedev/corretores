{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-lg-9">

    <!-- Header -->
    <div class="hero-section mb-4" style="padding:2.5rem">
      <div class="hero-badge mb-3">Serviços</div>
      <h1 class="hero-title" style="font-size:clamp(1.6rem,3vw,2.2rem)">{{ titulo }}</h1>
    </div>

    <!-- Content -->
    <div class="content-card mb-4">
      <p style="white-space:pre-wrap;line-height:1.9;color:var(--text-2);font-size:1rem">{{ conteudo }}</p>
    </div>

    <!-- Contact Form -->
    <div class="contact-card">
      <div class="contact-card-header">
        <div class="d-flex align-items-center gap-3">
          <div style="width:40px;height:40px;background:rgba(255,255,255,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0">📩</div>
          <div>
            <h3>Enviar solicitação</h3>
            <p>Preencha e entraremos em contato rapidamente.</p>
          </div>
        </div>
      </div>
      <div class="contact-card-body">
        <form method="post" action="{{ url_for('salvar_lead') }}">
          <input type="hidden" name="tipo" value="{{ slug }}">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Nome</label>
              <input name="nome" class="form-control" placeholder="Seu nome completo" required>
            </div>
            <div class="col-md-3">
              <label class="form-label">E-mail</label>
              <input name="email" class="form-control" placeholder="voce@email.com" type="email">
            </div>
            <div class="col-md-3">
              <label class="form-label">Telefone</label>
              <input name="telefone" class="form-control" placeholder="(11) 99999-9999">
            </div>
            <div class="col-12">
              <label class="form-label">Imóvel de interesse (opcional)</label>
              <input name="imovel_interesse" class="form-control" placeholder="Apartamento, casa, sala comercial…">
            </div>
            <div class="col-12">
              <label class="form-label">Mensagem</label>
              <textarea name="mensagem" rows="4" class="form-control" placeholder="Descreva o que você precisa…"></textarea>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-whatsapp w-100 py-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326z"/>
                </svg>
                Enviar e falar no WhatsApp
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>

{% endblock %}
