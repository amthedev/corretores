{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">

    <div class="hero-section mb-4" style="padding:2rem 2.5rem">
      <div class="hero-badge mb-3">Página</div>
      <h1 class="hero-title" style="font-size:clamp(1.5rem,3vw,2rem)">{{ titulo }}</h1>
    </div>

    <div class="content-card">
      <p style="white-space:pre-wrap;line-height:1.9;color:var(--text-2);font-size:1rem">{{ conteudo }}</p>
    </div>

  </div>
</div>

{% endblock %}
