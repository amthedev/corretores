{% extends "admin/base_admin.html" %}
{% block content %}
<h1 class="h3 mb-3">Logs de atividades</h1>
<table class="table table-striped table-bordered bg-white">
    <thead>
        <tr>
            <th>ID</th>
            <th>Usuário</th>
            <th>Ação</th>
            <th>Data</th>
        </tr>
    </thead>
    <tbody>
    {% for log in logs %}
        <tr>
            <td>{{ log["id"] }}</td>
            <td>{{ log["user_nome"] or "Sistema" }}</td>
            <td>{{ log["action"] }}</td>
            <td>{{ log["created_at"][:19].replace('T', ' ') }}</td>
        </tr>
    {% else %}
        <tr><td colspan="4" class="text-center">Sem logs.</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
